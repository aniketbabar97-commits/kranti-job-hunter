name: 🎯 Daily Job Hunter — Kranti

on:
  schedule:
    - cron: "0 6 * * 1-5"   # Mon–Fri 7:00 AM CET (6:00 AM UTC)
  workflow_dispatch:         # run manually anytime from Actions tab

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write        # needed to commit tracker updates back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore tracker cache
        uses: actions/cache@v4
        with:
          path: tracker/
          key: tracker-${{ github.run_number }}
          restore-keys: tracker-

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Job Hunter
        env:
          # ── AI (FREE — sign up at console.groq.com) ────────────────
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}

          # ── Email via Resend.com (FREE — sign up at resend.com) ────
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:      ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:        ${{ secrets.TO_EMAIL }}

          # ── Phone push via ntfy.sh (ZERO signup) ──────────────────
          NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}

          # ── GitHub (auto-provided) ─────────────────────────────────
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:     ${{ github.repository }}

        run: python scripts/job_hunter.py

      - name: Upload email preview & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-digest-${{ github.run_number }}
          path: |
            email_preview.html
            jobs_log.json
            tracker/
          retention-days: 14

      - name: Commit tracker updates
        if: always()
        run: |
          git config user.name  "Job Hunter Bot"
          git config user.email "bot@job-hunter"
          git add tracker/ jobs_log.json email_preview.html || true
          git diff --staged --quiet || git commit -m "📊 tracker: $(date +%Y-%m-%d)"
          git push || true
